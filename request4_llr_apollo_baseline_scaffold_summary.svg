<text x="68" y="614" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827">Notes</text>
<text x="68" y="646" font-family="sans-serif" font-size="13" fill="#374151">This is a nuisance/design scaffold for the APOLLO-only branch, not a GR residual fit.</text>
<text x="68" y="670" font-family="sans-serif" font-size="13" fill="#374151">Batch indicators are included because APOLLO release groups may coincide with reduction-version boundaries.</text>
<text x="68" y="694" font-family="sans-serif" font-size="13" fill="#374151">Reflector indicators provide a first scaffold for reflector-specific biases.</text>
<text x="68" y="718" font-family="sans-serif" font-size="13" fill="#374151">Annual and lunar-month harmonics are surrogate basis functions only; they are not a physical Earth-Moon ephemeris.</text>
<text x="68" y="742" font-family="sans-serif" font-size="13" fill="#374151">One zero-photon record is floored at photon_count=1 before taking log10 so the design matrix stays finite.</text>
<text x="68" y="758" font-family="sans-serif" font-size="13" fill="#111827">stop rule: If a narrow APOLLO-only baseline GR residual layer cannot be stabilized on top of this scaffold, the next move should be to attach to an existing LLR estimator or pivot to the CRD/ILRS path.</text>
