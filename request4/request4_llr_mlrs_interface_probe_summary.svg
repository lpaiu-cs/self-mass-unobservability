<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="980" viewBox="0 0 1450 980">
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="48" y="46" font-family="sans-serif" font-size="24" font-weight="700" fill="#111827">Request 4: MLRS interface probe</text>
<text x="48" y="74" font-family="sans-serif" font-size="14" fill="#475569">Baseline-vs-reference drift classification and bounded recalc-layer synthetic hook test.</text>
<rect x="48" y="108" width="1354" height="190" fill="white" stroke="#cbd5e1"/>
<text x="66" y="138" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827">Baseline vs reference</text>
<text x="66" y="168" font-family="monospace" font-size="13" fill="#111827">frrec: 79 lines, max |Δ| = 0.001000 ns</text>
<text x="66" y="192" font-family="monospace" font-size="13" fill="#111827">frfin: 1 line, max |Δ| = 0.001000 ns</text>
<text x="66" y="216" font-family="monospace" font-size="13" fill="#111827">frd exact = True</text>
<text x="66" y="240" font-family="monospace" font-size="13" fill="#111827">npt: 1 line, max |Δ| = 0.300</text>
<text x="66" y="264" font-family="monospace" font-size="13" fill="#111827">Interpretation: baseline drift appears first in 93 residual records, not only at final formatting.</text>
<rect x="48" y="330" width="1354" height="230" fill="white" stroke="#cbd5e1"/>
<text x="66" y="360" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827">Synthetic offset probe</text>
<text x="66" y="390" font-family="monospace" font-size="13" fill="#111827">offset = 0.005000 ns via SMU_OMC_OFFSET_NS</text>
<text x="66" y="414" font-family="monospace" font-size="13" fill="#111827">frrec changed 93 lines = 1456/1761</text>
<text x="66" y="438" font-family="monospace" font-size="13" fill="#111827">frrec observed Δ range = [0.000000, 0.005000] ns</text>
<text x="66" y="462" font-family="monospace" font-size="13" fill="#111827">frfin diff lines = 12</text>
<text x="66" y="486" font-family="monospace" font-size="13" fill="#111827">frd exact after offset = True</text>
<text x="66" y="510" font-family="monospace" font-size="13" fill="#111827">npt diff lines = 1</text>
<text x="66" y="534" font-family="monospace" font-size="13" fill="#111827">npt first-line drift: TOF and PmM shift, downstream file shape intact.</text>
<rect x="48" y="592" width="1354" height="310" fill="white" stroke="#cbd5e1"/>
<text x="66" y="622" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827">Interface reading</text>
<text x="66" y="652" font-family="monospace" font-size="13" fill="#111827">candidate 1: np_crd.f recalc OMC computation and 93 writer</text>
<text x="66" y="676" font-family="monospace" font-size="13" fill="#111827">candidate 2: jjreadnp.f / jreade state bridge into JPL PLEPH</text>
<text x="66" y="700" font-family="monospace" font-size="13" fill="#111827">stop rule: if true delta_SEP needs broad batch-stack surgery beyond these seams, pivot outward.</text>
<text x="66" y="736" font-family="monospace" font-size="13" fill="#111827">assessment = Baseline-ref drift is a real recalc-state microdrift confined to 93 residual records, not a pure final-formatting artifact. The synthetic OMC hook shows a bounded correction can be injected at the recalc layer and propagated through normalpoint generation without breaking the downstream batch stack.</text>
