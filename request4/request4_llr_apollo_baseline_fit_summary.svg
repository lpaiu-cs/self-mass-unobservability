<text x="66" y="620" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827">Notes</text>
<text x="66" y="652" font-family="sans-serif" font-size="13" fill="#374151">This is a narrow APOLLO-only baseline surrogate, not a production LLR estimator.</text>
<text x="66" y="676" font-family="sans-serif" font-size="13" fill="#374151">The nominal model is geocentric Earth-Moon center distance from DE421 and omits full station, reflector, troposphere, orientation, and relativistic light-time modeling.</text>
<text x="66" y="700" font-family="sans-serif" font-size="13" fill="#374151">The residual layer includes batch offsets, reflector biases, meteo surrogates, and annual/monthly/day harmonic blocks only.</text>
<text x="66" y="724" font-family="sans-serif" font-size="13" fill="#374151">Residuals remaining at O(10^5-10^6) m mean the bespoke APOLLO-only branch is still far from a credible weak-field verdict path.</text>
<text x="66" y="748" font-family="sans-serif" font-size="13" fill="#374151">At that point the healthy next move is to attach to an existing LLR estimator or pivot to the CRD/ILRS canonical path rather than keep growing this surrogate indefinitely.</text>
</svg>