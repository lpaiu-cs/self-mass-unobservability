<text x="66" y="194" font-family="monospace" font-size="13" fill="#111827">eta_* = 3.831e-04 ± 6.482e-04, |eta_*|_95 = 1.482e-03</text>
<text x="66" y="218" font-family="monospace" font-size="13" fill="#111827">kappa_* = 3.195e-03 ± 2.033e-02, |kappa_*|_95 = 3.586e-02</text>
<text x="66" y="242" font-family="monospace" font-size="13" fill="#111827">corr(eta_*,kappa_*) = 0.325</text>
<text x="66" y="266" font-family="sans-serif" font-size="12" fill="#475569">The clock branch is represented by a local Gaussian surrogate in (eta_*, kappa_*) derived from Request 6, not by a new TOA fit.</text>
